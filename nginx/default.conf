# Nginx config for CAP_DASH frontend container.
# Serves the React SPA and reverse-proxies /api/* to the backend container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- API reverse proxy ----------
    location /api/ {
        proxy_pass         http://capdash-backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---------- FastAPI docs (optional, dev convenience) ----------
    location /docs {
        proxy_pass http://capdash-backend:8000/docs;
    }
    location /redoc {
        proxy_pass http://capdash-backend:8000/redoc;
    }
    location /openapi.json {
        proxy_pass http://capdash-backend:8000/openapi.json;
    }

    # ---------- SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- Cache static assets ----------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
